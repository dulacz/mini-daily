<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Happy coding and have fun, generated by pmvibecoding template - https://github.com/chenxizhang/pmvibecoding, empower every product manager on the planet to achieve more by building their product prototype with AI.">
    <title>S1 外野 Newsfeed - Mini Daily</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='newsfeed.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="{{ url_for('static', path='shared-utils.js') }}"></script>
</head>

<body class="dark-theme">
    <!-- Navigation -->
    <nav class="navigation">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>Mini Daily</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Daily Check-in</a>
                <a href="/todo_coding" class="nav-link">Coding Problems</a>
                <a href="/newsfeed" class="nav-link active">S1 外野</a>
            </div>
        </div>
    </nav>

    <div class="newsfeed-container">
        <!-- Page header -->
        <header class="newsfeed-header">
            <div class="newsfeed-header-content">
                <h2 class="newsfeed-title">📰 S1 外野 每日要闻</h2>
                <p class="newsfeed-subtitle">由 AI 对热门帖子自动摘要，每日自动更新</p>
            </div>
            <div class="newsfeed-meta" id="newsfeed-meta">
                <span class="meta-date" id="meta-date">加载中…</span>
                <span class="meta-status" id="meta-status"></span>
            </div>
        </header>

        <!-- Action bar -->
        <div class="action-bar">
            <button class="btn-refresh" id="btn-refresh">
                <span id="refresh-icon">🔄</span> 立即刷新
            </button>
            <span class="action-hint" id="action-hint"></span>
        </div>

        <!-- Loading state -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p>加载摘要中，请稍候…</p>
        </div>

        <!-- Not-ready state -->
        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="empty-icon">📭</div>
            <h3>暂无数据</h3>
            <p>今日摘要尚未生成。可点击「立即刷新」手动触发，或等待后台自动运行（每天一次）。</p>
        </div>

        <!-- Running state -->
        <div class="running-state" id="running-state" style="display:none;">
            <div class="spinner"></div>
            <p>正在抓取并摘要帖子，这可能需要几分钟…</p>
        </div>

        <!-- Progress banner (shown above partial results) -->
        <div class="progress-banner" id="progress-banner" style="display:none;">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span id="progress-label"></span>
        </div>

        <!-- Posts grid -->
        <div class="posts-grid" id="posts-grid" style="display:none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', path='newsfeed.js') }}"></script>
</body>

</html>
